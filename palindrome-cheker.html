<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is palindrome</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="ProjectNav"><a href="index.html">Home</a></div>
<h1>We can checking the words!</h1>
<div id="UI">
<input type="text" id="inputString" placeholder="back words ?">
<button id="theButton">Check</button>
<p id="feedback">Le feedback ici...</p>
</div>
<script>
const theFeedback = document.getElementById("feedback");
const theButton = document.getElementById("theButton");

theButton.addEventListener("click", checkTheText);

function checkTheText() {
  const theInput = document.getElementById("inputString");
  const word = theInput.value.trim();

  if (word === "") {
    theFeedback.innerHTML = "Entre un mot d'abord!";
    return;
  }

  if (isPalindrome(word)) {
    theFeedback.innerHTML = "\"" + word + "\" est un palindrome!";
  } else {
    theFeedback.innerHTML = "\"" + word + "\" n'est pas un palindrome.";
  }
}

function isPalindrome(str) {
  const cleaned = str.toLowerCase().replace(/[\s\-]/g, "");
  const reversed = cleaned.split("").reverse().join("");
  return cleaned === reversed;
}
</script>
</body>
</html>
